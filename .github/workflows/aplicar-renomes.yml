name: Aplicar renomes de imagens (raiz, com PR robusto)

on:
  workflow_dispatch:
    inputs:
      renames_path:
        description: 'Caminho do CSV de renomes'
        required: true
        default: 'renomes.csv'
      dry_run:
        description: 'Apenas simular (não altera arquivos)'
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-renomes:
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: auto/renomes-${{ github.run_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Verificar arquivo de renomes (exibe cabeçalho)
        run: |
          test -f "${{ inputs.renames_path }}" || (echo "Arquivo não encontrado: ${{ inputs.renames_path }}" && exit 1)
          echo "Usando: ${{ inputs.renames_path }}"
          echo "Tamanho (bytes):"; wc -c "${{ inputs.renames_path }}" || true
          echo "Total de linhas:"; wc -l "${{ inputs.renames_path }}" || true
          echo "Primeiras linhas:"; sed -n '1,12p' "${{ inputs.renames_path }}" || true

      - name: Aplicar renomes (ou simular)
        id: run
        run: |
          python - <<'PY'
          import csv, subprocess, sys
          from pathlib import Path

          RENAMES = Path("${{ inputs.renames_path }}")
          DRY = "${{ inputs.dry_run }}".lower() == "true"

          repo_root = Path(".").resolve()
          applied = skipped_missing = skipped_same = planned = rows_lidas = 0
          ops = []

          def git_mv(src: Path, dst: Path):
            if src.name.lower() == dst.name.lower() and src.name != dst.name:
              tmp = dst.with_name(dst.name + ".tmp_case")
              subprocess.run(["git","mv","-f",str(src),str(tmp)], check=True)
              subprocess.run(["git","mv","-f",str(tmp),str(dst)], check=True)
            else:
              subprocess.run(["git","mv","-f",str(src),str(dst)], check=True)

          with RENAMES.open("r", encoding="utf-8-sig", newline="") as f:
            reader = csv.DictReader(f)
            headers = reader.fieldnames or []
            print(f"HEADERS_ENCONTRADOS={headers}")
            required = {"pasta","origem","destino"}
            if not required.issubset({h.strip() for h in headers}):
              print(f"ERRO_HEADERS: esperado {sorted(required)}, encontrado {headers}")
              sys.exit(1)

            for row in reader:
              rows_lidas += 1
              folder = row["pasta"].strip()
              src_name = row["origem"].strip()
              dst_name = row["destino"].strip()

              src = repo_root / folder / src_name
              dst = repo_root / folder / dst_name

              if not src.exists():
                ops.append(f"[MISS] {src}")
                skipped_missing += 1
                continue
              if src == dst:
                ops.append(f"[SAME] {src}")
                skipped_same += 1
                continue

              planned += 1
              ops.append(f"[MOVE] {src} -> {dst}")
              if not DRY:
                dst.parent.mkdir(parents=True, exist_ok=True)
                git_mv(src, dst)
                applied += 1

          print("\n".join(ops[:150]))
          print(f"ROWS_LIDAS={rows_lidas} PLANNED={planned} APPLIED={applied} MISSING={skipped_missing} SAME={skipped_same}")
          PY

      - name: Abrir Pull Request (só se não for dry-run)
        if: ${{ inputs.dry_run == false }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH_NAME }}
          base: ${{ github.event.repository.default_branch }}
          commit-message: "chore: aplicar renomes de imagens"
          title: "Aplicar renomes de imagens"
          body: |
            Este PR aplica os renomes definidos em `${{ inputs.renames_path }}`.
            Logs do job mostram o plano em "Aplicar renomes (ou simular)".
          delete-branch: true
