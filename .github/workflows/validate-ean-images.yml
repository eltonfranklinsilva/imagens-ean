name: Validar nomes de imagens por EAN

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 9 * * 1" # toda segunda 09:00 UTC (ajuste como preferir)

permissions:
  contents: read
  issues: write  # necessário apenas se quiser abrir Issue automaticamente

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências (nenhuma necessária)
        run: |
          python -V

      - name: Rodar validador
        run: |
          python scripts/validate_ean_images.py --root . --out-dir ./report --check-sequential

      - name: Upload de artefatos do relatório
        uses: actions/upload-artifact@v4
        with:
          name: ean-validation-report
          path: |
            report/VALIDATION_REPORT.md
            report/validation-report.csv
            report/validation-report.json

      # Opcional: criar um Issue se houver não conformidades
      - name: Abrir Issue com problemas (opcional)
        if: always()
        run: |
          if grep -q "❌" report/VALIDATION_REPORT.md; then
            title="Validação de nomes de imagens - Problemas encontrados"
            body_file="report/VALIDATION_REPORT.md"
            gh issue create --title "$title" --body-file "$body_file" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
