name: Aplicar renomes de imagens

on:
  workflow_dispatch:
    inputs:
      renames_path:
        description: 'Caminho do CSV de renomes'
        required: true
        default: 'renomes.csv'
      dry_run:
        description: 'Apenas simular (não altera arquivos)'
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-renames:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verificar arquivo de renomes
        run: |
          test -f "${{ inputs.renames_path }}" || (echo "Arquivo não encontrado: ${{ inputs.renames_path }}" && exit 1)
          echo "Usando: ${{ inputs.renames_path }}"
          sed -n '1,5p' "${{ inputs.renames_path }}"

      - name: Aplicar renomes (ou simular)
        id: run
        run: |
          python - <<'PY'
          import csv, os, subprocess, shlex
          from pathlib import Path

          RENAMES = Path("${{ inputs.renames_path }}")
          DRY = "${{ inputs.dry_run }}".lower() == "true"

          repo_root = Path(".").resolve()
          applied = 0
          skipped_missing = 0
          skipped_same = 0
          ops = []

          def run_git_mv(src: Path, dst: Path):
            # Caso especial: rename apenas por diferença de caixa
            if src.name.lower() == dst.name.lower() and src.name != dst.name:
              tmp = dst.with_name(dst.name + ".tmp_case")
              subprocess.run(["git","mv","-f",str(src),str(tmp)], check=True)
              subprocess.run(["git","mv","-f",str(tmp),str(dst)], check=True)
            else:
              subprocess.run(["git","mv","-f",str(src),str(dst)], check=True)

          with RENAMES.open("r", encoding="utf-8") as f:
            reader = csv.DictReader(f)
            for row in reader:
              folder = row["pasta"].strip()
              src_name = row["origem"].strip()
              dst_name = row["destino"].strip()

              src = repo_root / folder / src_name
              dst = repo_root / folder / dst_name

              if not src.exists():
                skipped_missing += 1
                ops.append(f"[MISS] {src}")
                continue
              if src == dst:
                skipped_same += 1
                ops.append(f"[SAME] {src}")
                continue

              ops.append(f"[MOVE] {src} -> {dst}")
              if not DRY:
                dst.parent.mkdir(parents=True, exist_ok=True)
                run_git_mv(src, dst)
                applied += 1

          print("\\n".join(ops))
          print(f"APPLIED={applied}")
          print(f"MISSING={skipped_missing}")
          print(f"SAME={skipped_same}")
          PY

      - name: Criar branch e commitar mudanças (só se não for dry-run)
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          BRANCH="auto/renomes-$(date -u +'%Y%m%d-%H%M%S')"
          git checkout -b "$BRANCH"
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: aplicar renomes de imagens"
            git push --set-upstream origin "$BRANCH"
          else
            echo "Nenhuma alteração para commitar."
            exit 0

      - name: Abrir Pull Request (só se não for dry-run)
        if: ${{ inputs.dry_run == 'false' }}
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Aplicar renomes de imagens"
          body: "Este PR aplica os renomes definidos em `${{ inputs.renames_path }}`."
          branch: ${{ github.ref_name }}
          base: ${{ github.event.repository.default_branch }}
          delete-branch: true
          draft: false

      - name: Upload do log (sempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renome-log
          path: |
            ${{ inputs.renames_path }}
``
